<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>做我女朋友好吗？</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe4ec, #fff6f9);
      overflow: hidden;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 380px;
      text-align: center;
      transform: translateY(-55px);
    }

    .photo {
      width: 72%;
      max-width: 220px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 28px;
      color: #ff4f87;
      font-size: 26px;
      line-height: 1.4;
    }

    .buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 34px; /* more space */
      transition: all 0.3s ease;
      min-height: 120px; /* reserve space so layout feels stable */
    }

    .buttons.stack {
      flex-direction: column;
      gap: 20px;
    }

    button {
      border: none;
      padding: 14px 24px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.25s ease, all 0.3s ease;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
      border-radius: 10px;
      -webkit-tap-highlight-color: transparent;
    }

    #yesBtn {
      background: #ff4f87;
      color: white;
      transform-origin: center center;
      min-width: 120px;
    }

    #noBtn {
      background: white;
      color: #ff4f87;
      border: 2px solid #ff4f87;
      width: 150px;          /* fixed width so spacing is predictable */
      min-height: 56px;      /* fixed height helps layout */
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.25;
      padding: 10px 14px;
      word-break: break-word;
    }

    .popup {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
    }

    .popup-content {
      background: white;
      padding: 24px;
      border-radius: 18px;
      text-align: center;
      width: 80%;
      max-width: 300px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      animation: pop 0.35s ease;
    }

    .popup-img {
      width: 180px;
      max-width: 100%;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .popup-content h2 {
      margin: 0 0 10px;
      color: #ff4f87;
    }

    .popup-content p {
      margin: 0;
      font-size: 18px;
      color: #444;
      line-height: 1.5;
    }

    .heart {
      position: fixed;
      bottom: -20px;
      font-size: 24px;
      animation: floatUp linear forwards;
      pointer-events: none;
      opacity: 0.9;
      z-index: 1;
    }

    @keyframes pop {
      from {
        transform: scale(0.65);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.9;
      }
      100% {
        transform: translateY(-110vh) scale(1.6);
        opacity: 0;
      }
    }

    @media (max-width: 480px) {
      .container {
        transform: translateY(-65px);
      }

      h1 {
        font-size: 24px;
      }

      .buttons {
        gap: 28px;
      }

      button {
        font-size: 16px;
      }

      #yesBtn {
        min-width: 112px;
      }

      #noBtn {
        width: 145px;
        min-height: 54px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="photo" src="images/1.jpg" alt="我们的照片" />

    <h1>小肥猪，你愿意和我在一起吗？</h1>

    <div class="buttons" id="buttonArea">
      <button id="yesBtn">我愿意</button>
      <button id="noBtn">我不要</button>
    </div>
  </div>

  <div id="popup" class="popup">
    <div class="popup-content">
      <img src="images/2.jpg" class="popup-img" alt="庆祝照片" />
      <h2>哇哇太好了 💖</h2>
      <p>我就知道你喜欢我嘻嘻嘻</p>
    </div>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const popup = document.getElementById("popup");
    const buttonArea = document.getElementById("buttonArea");

    let yesScale = 1;
    let noClickCount = 0;

    const beggingTexts = [
      "再想想好不好～",
      "你确定真的不要吗？",
      "拜托拜托啦 💞",
      "最后一次机会了哦",
      "你忍心拒绝我吗 😭",
      "按我愿意就好啦",
      "你看我多真诚 🥹"
    ];

    function updateButtonLayout() {
      // switch earlier so they never look too close
      if (yesScale >= 1.35) {
        buttonArea.classList.add("stack");
      } else {
        buttonArea.classList.remove("stack");
      }
    }

    function handleNoClick() {
      noClickCount++;

      yesScale += 0.17;
      yesBtn.style.transform = `scale(${yesScale})`;

      const text = beggingTexts[(noClickCount - 1) % beggingTexts.length];
      noBtn.textContent = text;

      updateButtonLayout();
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.textContent = Math.random() > 0.5 ? "💖" : "💕";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
      heart.style.fontSize = (Math.random() * 14 + 18) + "px";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 5000);
    }

    function celebrateYes() {

      fetch("https://api.telegram.org/bot8780685046:AAHXtXXLityd6KlJCcgVvtshT8gvuFLDLKo/sendMessage",{
      method:"POST",
      headers:{
      "Content-Type":"application/json"
      },
      body:JSON.stringify({
      chat_id:"-5158446761",
      text:"🎉 Someone clicked YES! She said YES!"
      })
      })

      confetti({
        particleCount: 200,
        spread: 100,
        origin: { y: 0.6 }
      });

      setTimeout(() => {
        confetti({
          particleCount: 120,
          spread: 120,
          origin: { y: 0.5 }
        });
      }, 300);

      for (let i = 0; i < 20; i++) {
        setTimeout(createHeart, i * 120);
      }

      popup.style.display = "flex";
    }

    noBtn.addEventListener("click", handleNoClick);
    yesBtn.addEventListener("click", celebrateYes);

    popup.addEventListener("click", () => {
      popup.style.display = "none";
    });
  </script>
</body>
</html>
