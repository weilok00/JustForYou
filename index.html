<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>做我女朋友好吗？</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --pink: #ff4f87;
      --light-pink: #ffe4ec;
      --bg1: #fff0f5;
      --bg2: #fff8fb;
      --text: #333;
      --white: rgba(255, 255, 255, 0.78);
      --shadow: 0 10px 35px rgba(255, 79, 135, 0.16);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Arial", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, #ffdbe8 0%, transparent 35%),
        radial-gradient(circle at bottom right, #ffeef5 0%, transparent 40%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
    }

    .bg-blur {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
      animation: floatBlob 10s ease-in-out infinite alternate;
    }

    .blob1 {
      width: 220px;
      height: 220px;
      background: #ffc3d6;
      top: 8%;
      left: -40px;
    }

    .blob2 {
      width: 260px;
      height: 260px;
      background: #ffdff0;
      bottom: 8%;
      right: -50px;
      animation-delay: 1.5s;
    }

    .blob3 {
      width: 180px;
      height: 180px;
      background: #ffd2e4;
      top: 45%;
      left: 55%;
      animation-delay: 3s;
    }

    @keyframes floatBlob {
      from {
        transform: translateY(0) translateX(0) scale(1);
      }
      to {
        transform: translateY(-18px) translateX(12px) scale(1.08);
      }
    }

    .loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffe4ec, #fff8fb);
      flex-direction: column;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .loader.hide {
      opacity: 0;
      visibility: hidden;
    }

    .loader-heart {
      font-size: 52px;
      animation: pulse 1s infinite;
    }

    .loader-text {
      margin-top: 14px;
      color: var(--pink);
      font-size: 18px;
      font-weight: bold;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }

    .top-bar {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 20;
      display: flex;
      gap: 10px;
    }

    .icon-btn {
      border: none;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      border-radius: 999px;
      width: 46px;
      height: 46px;
      font-size: 18px;
      cursor: pointer;
    }

    .page {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100vh;
      padding: 28px 16px 50px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 430px;
    }

    .hero-card {
      background: var(--white);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 22px 18px 26px;
      text-align: center;
      animation: fadeUp 0.8s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .badge {
      display: inline-block;
      font-size: 13px;
      color: var(--pink);
      background: #fff;
      border: 1px solid #ffd5e3;
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
      font-weight: bold;
    }

    .photo-frame {
      position: relative;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      margin-bottom: 18px;
    }

    .photo {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: block;
    }

    .photo-caption {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 8px 12px;
      font-size: 13px;
      color: #555;
    }

    h1 {
      margin: 8px 0 10px;
      color: var(--pink);
      font-size: 29px;
      line-height: 1.35;
    }

    .typing-text {
      min-height: 56px;
      font-size: 16px;
      color: #555;
      line-height: 1.7;
      margin: 0 auto 18px;
      max-width: 320px;
    }

    .section {
      margin-top: 18px;
      background: rgba(255,255,255,0.74);
      border-radius: 20px;
      padding: 16px;
      text-align: left;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 18px;
      color: var(--pink);
    }

    .reasons {
      display: grid;
      gap: 10px;
    }

    .reason-item {
      background: #fff;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
      box-shadow: 0 4px 12px rgba(255, 79, 135, 0.08);
    }

    .timeline {
      display: grid;
      gap: 12px;
    }

    .timeline-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: #fff;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 4px 12px rgba(255, 79, 135, 0.07);
            font-size: 14px;
    }

    .timeline-dot {
      width: 12px;
      height: 12px;
      background: var(--pink);
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .timeline-item b {
      display: block;
      margin-bottom: 4px;
      color: #444;
    }

    .buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 26px;
      transition: all 0.3s ease;
      min-height: 120px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .buttons.stack {
      flex-direction: column;
      gap: 18px;
    }

    button {
      border: none;
      padding: 14px 24px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.25s ease, all 0.3s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      border-radius: 14px;
      -webkit-tap-highlight-color: transparent;
    }

    #yesBtn {
      background: linear-gradient(135deg, #ff5e94, #ff3577);
      color: white;
      transform-origin: center center;
      min-width: 132px;
    }

    #noBtn {
      background: white;
      color: var(--pink);
      border: 2px solid var(--pink);
      width: 156px;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.25;
      padding: 10px 14px;
      word-break: break-word;
    }

    .hint {
      margin-top: 4px;
      font-size: 13px;
      color: #888;
    }

    .popup {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.58);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
    }

    .popup-content {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(14px);
      padding: 24px;
      border-radius: 22px;
      text-align: center;
      width: 92%;
      max-width: 340px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
      animation: pop 0.35s ease;
    }

    .popup-img {
      width: 190px;
      max-width: 100%;
      border-radius: 16px;
      margin-bottom: 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.14);
    }

    .popup-content h2 {
      margin: 0 0 10px;
      color: var(--pink);
      font-size: 24px;
    }

    .popup-content p {
      margin: 0 0 14px;
      font-size: 17px;
      color: #444;
      line-height: 1.6;
    }

    .popup-content .final-note {
      font-size: 14px;
      color: #777;
    }

    @keyframes pop {
      from {
        transform: scale(0.65);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .heart {
      position: fixed;
      bottom: -20px;
      font-size: 24px;
      animation: floatUp linear forwards;
      pointer-events: none;
      opacity: 0.9;
      z-index: 1;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.95;
      }
      100% {
        transform: translateY(-110vh) scale(1.7);
        opacity: 0;
      }
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 18px;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 25px;
      }

      .photo {
        height: 270px;
      }

      .typing-text {
        font-size: 15px;
      }
    }
    #volumeSlider {
      width: 100px;
      accent-color: #ff4f87;
      cursor: pointer;
    }
    #loader {
      cursor: pointer;
    }

  </style>
</head>
<body>
    <div class="loader" id="loader">
      <div class="loader-heart">💖</div>
      <div class="loader-text">点击打开属于你的浪漫页面</div>
    </div>

  <div class="bg-blur">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <div class="top-bar">
    <button class="icon-btn" id="musicBtn">🎵</button>
    <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.3">
  </div>

  <audio id="bgMusic" loop>
    <source src="music/童话.mp4" type="audio/mpeg" />
  </audio>

  <div class="page">
    <div class="container">
      <div class="hero-card">
        <div class="badge">💌 一份认真准备的小小告白</div>

        <div class="photo-frame">
          <img id="mainPhoto" class="photo" src="images/1.jpeg" alt="你的照片" />
          <div class="photo-caption" id="photoCaption">我很高兴可以认识你</div>
        </div>

        <p class="typing-text" id="typingText"></p>

        <div class="section">
          <h2>为什么是你 💗</h2>
          <div class="reasons">
            <div class="reason-item">因为和你聊天、见面、相处，都会让我偷偷开心很久</div>
            <div class="reason-item">虽然你有时不理我，突冷突热不知道你在想什么。</div>
            <div class="reason-item">但是我还是想把未来更多好吃的、好玩的、好看的都分享给你。</div>
          </div>
        </div>

        <div class="section">
          <h2>我的回忆 ✨</h2>
          <div class="timeline">
            <div class="timeline-item">
              <div class="timeline-dot"></div>
              <div>
                <b>第一次心动</b>
                <div>从某个瞬间开始，我发现自己会不自觉地想起你。</div>
              </div>
            </div>
            <div class="timeline-item">
              <div class="timeline-dot"></div>
              <div>
                <b>每次聊天都很开心</b>
                <div>不管聊什么，只要对象是你，平凡的事情也会变得特别。</div>
              </div>
            </div>
            <div class="timeline-item">
              <div class="timeline-dot"></div>
              <div>
                <b>今天鼓起勇气</b>
                <div>所以我认真做了这个页面，只想问你一句最重要的话。</div>
              <div style="margin-top:16px; text-align:center;">
                <h1 style="margin-top:12px;">你愿意和我在一起吗？ 💖</h1>
              </div>
              </div>
            </div>
          </div>
        </div>

        <div class="buttons" id="buttonArea">
          <button id="yesBtn">我愿意 💖</button>
          <button id="noBtn">我不要</button>
        </div>
      </div>
    </div>
  </div>

  <div id="popup" class="popup">
    <div class="popup-content">
      <img src="images/2.jpg" class="popup-img" alt="庆祝照片" />
      <h2>哇哇太好了 💖</h2>
      <p>从现在开始，请多多指教啦，我会好好珍惜你。</p>
      <div class="final-note">点击任意地方关闭这个页面上的小惊喜 ✨</div>
    </div>
  </div>

<script>
  const yesBtn = document.getElementById("yesBtn");
  const noBtn = document.getElementById("noBtn");
  const popup = document.getElementById("popup");
  const buttonArea = document.getElementById("buttonArea");
  const typingText = document.getElementById("typingText");
  const bgMusic = document.getElementById("bgMusic");
  const musicBtn = document.getElementById("musicBtn");
  const loader = document.getElementById("loader");
  const mainPhoto = document.getElementById("mainPhoto");
  const photoCaption = document.getElementById("photoCaption");
  const volumeSlider = document.getElementById("volumeSlider");

  let yesScale = 1;
  let noClickCount = 0;
  let musicStarted = false;
  let isMuted = false;
  let pageOpened = false;

  const beggingTexts = [
    "再想想好不好～",
    "你确定真的不要吗？",
    "拜托拜托啦 💞",
    "最后一次机会了哦",
    "你忍心拒绝我吗 😭",
    "按我愿意就好啦",
    "你看我多真诚 🥹"
  ];

  const proposalLines =
    "我记得你 liked 过类似的东西，所以我也想用一个特别的方式跟你告白。";

  const photos = [
    { src: "images/1.jpeg", caption: "你发我的照片我都会存起来的。" },
    { src: "images/3.jpeg", caption: "我会把关于你的可爱瞬间，认真收藏起来。" },
    { src: "images/4.jpeg", caption: "希望以后的照片会有我们。" }
  ];

  let photoIndex = 0;

  bgMusic.volume = parseFloat(volumeSlider.value);

  function typeWriter(text, el, speed = 55) {
    let i = 0;
    el.textContent = "";

    function typing() {
      if (i < text.length) {
        el.textContent += text.charAt(i);
        i++;
        setTimeout(typing, speed);
      }
    }

    typing();
  }

  function updateButtonLayout() {
    if (yesScale >= 1.35) {
      buttonArea.classList.add("stack");
    } else {
      buttonArea.classList.remove("stack");
    }
  }

  function handleNoClick() {
    noClickCount++;
    yesScale += 0.18;
    yesBtn.style.transform = `scale(${yesScale})`;
    noBtn.textContent = beggingTexts[(noClickCount - 1) % beggingTexts.length];
    updateButtonLayout();

    if (noClickCount >= 6) {
      noBtn.style.transform = "scale(0.92)";
      noBtn.style.opacity = "0.85";
    }
  }

  function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.textContent = Math.random() > 0.5 ? "💖" : "💕";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
    heart.style.fontSize = (Math.random() * 14 + 18) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }

  function startHeartsBackground() {
    setInterval(() => {
      createHeart();
    }, 900);
  }

  function fadeInMusic() {
    let targetVolume = parseFloat(volumeSlider.value);
    bgMusic.volume = 0;

    let vol = 0;
    const interval = setInterval(() => {
      if (vol < targetVolume) {
        vol += 0.03;
        bgMusic.volume = Math.min(vol, targetVolume);
      } else {
        clearInterval(interval);
      }
    }, 120);
  }

  function startMusic() {
    if (!musicStarted) {
      bgMusic.play().then(() => {
        fadeInMusic();
        musicStarted = true;
        musicBtn.textContent = "🔊";
      }).catch((err) => {
        console.log("music play blocked:", err);
      });
    }
  }

  function toggleMusic() {
    if (!musicStarted) {
      startMusic();
      return;
    }

    isMuted = !isMuted;
    bgMusic.muted = isMuted;
    musicBtn.textContent = isMuted ? "🔇" : "🔊";
  }

  function rotatePhotos() {
    setInterval(() => {
      photoIndex = (photoIndex + 1) % photos.length;
      mainPhoto.style.opacity = "0.25";

      setTimeout(() => {
        mainPhoto.src = photos[photoIndex].src;
        photoCaption.textContent = photos[photoIndex].caption;
        mainPhoto.style.opacity = "1";
      }, 250);
    }, 3200);
  }

  function openPage() {
    if (pageOpened) return;
    pageOpened = true;

    startMusic();

    loader.style.opacity = "0";

    setTimeout(() => {
      loader.style.display = "none";
      typeWriter(proposalLines, typingText, 50);
      startHeartsBackground();
      rotatePhotos();
    }, 500);
  }

  function celebrateYes() {
    startMusic();
      fetch("https://api.telegram.org/bot8780685046:AAHXtXXLityd6KlJCcgVvtshT8gvuFLDLKo/sendMessage", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: "-5158446761",
          text: "🎉 Someone clicked YES! She said YES!"
        })
      })
        .then(async (res) => {
          const text = await res.text();
          console.log("telegram status:", res.status, text);
          alert("telegram status: " + res.status);
        })
        .catch((err) => {
          console.error("telegram error:", err);
          alert("telegram error: " + err.message);
        });

    confetti({
      particleCount: 220,
      spread: 100,
      origin: { y: 0.6 }
    });

    setTimeout(() => {
      confetti({
        particleCount: 150,
        spread: 130,
        origin: { y: 0.5 }
      });
    }, 300);

    for (let i = 0; i < 28; i++) {
      setTimeout(createHeart, i * 120);
    }

    popup.style.display = "flex";
  }

  noBtn.addEventListener("click", () => {
    startMusic();
    handleNoClick();
  });

  yesBtn.addEventListener("click", celebrateYes);
  musicBtn.addEventListener("click", toggleMusic);

  volumeSlider.addEventListener("input", (e) => {
    bgMusic.volume = parseFloat(e.target.value);
  });

  popup.addEventListener("click", () => {
    popup.style.display = "none";
  });

  loader.addEventListener("click", openPage);
</script> 
</body>
</html>
